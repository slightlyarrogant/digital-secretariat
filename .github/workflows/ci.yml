name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: ruff check src tests
      - run: black --check src tests
      - run: bash -n scripts/preflight.sh scripts/verify-install.sh deployment/secretariat/deploy.sh
      - run: pytest -q
