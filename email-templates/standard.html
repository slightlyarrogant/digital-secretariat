<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Digital Secretariat</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f4f4;">
  <tr>
    <td align="center" style="padding:24px 16px;">

      <!-- Outer wrapper: max 600px -->
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0"
             style="max-width:600px;width:100%;border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.10);">

        <!-- HEADER -->
        <tr>
          <td align="left" bgcolor="#1d2025"
              style="background-color:#1d2025;padding:18px 28px;color:#ffffff;
                     font-size:18px;font-weight:700;">
            Digital Secretariat
          </td>
        </tr>

        <!-- CONTENT -->
        <tr>
          <td bgcolor="#ffffff"
              style="background-color:#ffffff;padding:32px 28px;color:#222222;
                     font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.6;">
            {{CONTENT}}
          </td>
        </tr>

        <!-- FOOTER -->
        <tr>
          <td align="center" bgcolor="#eef0f2"
              style="background-color:#eef0f2;padding:14px 28px;
                     font-family:Arial,Helvetica,sans-serif;font-size:12px;
                     color:#58616d;">
            Wiadomo&#x015B;&#x0107; wys&#x0142;ana przez kontrolowan&#x0105; szyn&#x0119; komunikacji.
          </td>
        </tr>

      </table>
      <!-- /outer wrapper -->

    </td>
  </tr>
</table>
</body>
</html>
